[build]
  command = "npm run build"
  publish = "dist"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/xxapi/*"
  to = "/.netlify/functions/xxapi/:splat"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/xxapi/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
