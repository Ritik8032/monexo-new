    <script>
      // 0a. Global Fetch Interceptor to mock/sanitize failing external requests
      (function() {
        const originalFetch = window.fetch;
        window.fetch = function(input, init) {
          let url = '';
          if (typeof input === 'string') {
            url = input;
          } else if (input instanceof URL) {
            url = input.href;
          } else if (input && typeof input === 'object' && input.url) {
            url = input.url;
          }

          if (url) {
            const lowerUrl = url.toLowerCase();
            // Mock ipapi request
            if (lowerUrl.indexOf('ipapi.tooripaindia.workers.dev') !== -1) {
              console.log("[Mock Fetch] Intercepted ipapi request");
              return Promise.resolve(new Response(JSON.stringify({ ip: "127.0.0.1" }), {
                status: 200,
                headers: { 'Content-Type': 'application/json' }
              }));
            }
            // Mock TRON grid or TRC20 requests
            if (lowerUrl.indexOf('trongrid.io') !== -1 || lowerUrl.indexOf('/transactions/trc20') !== -1) {
              console.log("[Mock Fetch] Intercepted TRON grid/TRC20 request:", url);
              return Promise.resolve(new Response(JSON.stringify({ data: [], meta: { page_size: 0 } }), {
                status: 200,
                headers: { 'Content-Type': 'application/json' }
              }));
            }
            // Catch-all for any other external domains to prevent them from causing uncaught Rejections
            if (lowerUrl.startsWith('http://') || lowerUrl.startsWith('https://')) {
              // Get current origin
              const origin = window.location.origin;
              if (!lowerUrl.startsWith(origin.toLowerCase())) {
                console.log("[Mock Fetch] Safe-guarding external fetch:", url);
                return Promise.resolve(new Response(JSON.stringify({ code: 0, msg: "success", data: {} }), {
                  status: 200,
                  headers: { 'Content-Type': 'application/json' }
                }));
              }
            }
          }
          return originalFetch.apply(this, arguments);
        };
      })();

      // 0. Global Error and Rejection Logging
      function isIgnorableError(msg) {
        if (!msg) return true;
        const lower = String(msg).toLowerCase();
        return (
          lower.indexOf('failed to fetch') !== -1 ||
          lower.indexOf('load failed') !== -1 ||
          lower.indexOf('[object object]') !== -1 ||
          lower.indexOf('networkerror') !== -1 ||
          lower.indexOf('aborted') !== -1 ||
          lower.indexOf('timeout') !== -1 ||
          lower.indexOf('image load error') !== -1 ||
          lower.indexOf('load error') !== -1 ||
          lower.indexOf('script error') !== -1
        );
      }

      window.addEventListener('error', function(e) {
        if (e.target && e.target !== window && (e.target.tagName || e.target.src || e.target.href)) {
          return; // Ignore asset loading errors
        }
        var errorInfo = {
          message: e.message,
          filename: e.filename,
          lineno: e.lineno,
          colno: e.colno,
          stack: e.error ? e.error.stack : ''
        };
        if (isIgnorableError(errorInfo.message)) {
          return;
        }
        console.error("GLOBAL ERROR CAPTURED:", errorInfo);
        fetch('/xxapi/client_error', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(errorInfo)
        }).catch(err => console.error("Error logging failed:", err));
      });

      window.addEventListener('unhandledrejection', function(e) {
        var errorInfo = {
          message: e.reason ? (e.reason.message || String(e.reason)) : 'Unhandled rejection',
          stack: e.reason ? e.reason.stack : ''
        };
        if (isIgnorableError(errorInfo.message)) {
          return;
        }
        console.error("GLOBAL REJECTION CAPTURED:", errorInfo);
        fetch('/xxapi/client_error', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(errorInfo)
        }).catch(err => console.error("Error logging failed:", err));
      });

      // 1. High-fidelity reCAPTCHA Mock
      window.grecaptcha = {
        ready: function(cb) {
          if (typeof cb === 'function') {
            try { cb(); } catch(e) { console.error(e); }
          }
        },
        execute: function(siteKey, options) {
          console.log("Mock reCAPTCHA execute called with siteKey:", siteKey);
          return Promise.resolve("mock-recaptcha-token");
        },
        render: function(container, options) {
          console.log("Mock reCAPTCHA render called");
          return "mock-recaptcha-widget-id";
        }
      };

      // 2. High-fidelity Turnstile Mock
      window.turnstile = {
        render: function(container, options) {
          console.log("Mock Turnstile render called with options:", options);
          if (options && typeof options.callback === 'function') {
            setTimeout(() => {
              try {
                options.callback("mock-turnstile-token");
              } catch(e) {
                console.error("Error in Turnstile callback:", e);
              }
            }, 100);
          }
          return "mock-turnstile-widget-id";
        },
        reset: function(id) {
          console.log("Mock Turnstile reset called for id:", id);
        },
        remove: function(id) {
          console.log("Mock Turnstile remove called for id:", id);
        },
        getResponse: function(id) {
          return "mock-turnstile-token";
        }
      };

      // 3. Auto-invocation of Turnstile onload callback
      let turnstileCallback = null;
      Object.defineProperty(window, 'onloadTurnstileCallback', {
        get() {
          return turnstileCallback;
        },
        set(fn) {
          turnstileCallback = fn;
          if (typeof fn === 'function') {
            console.log("onloadTurnstileCallback defined, invoking mock load event...");
            setTimeout(() => {
              try {
                fn();
              } catch (e) {
                console.error("Error in onloadTurnstileCallback:", e);
              }
            }, 50);
          }
        },
        configurable: true
      });

      // 4. Intercept and block third-party scripts to avoid "Script error." / CORS failures
      const originalSrcDescriptor = Object.getOwnPropertyDescriptor(HTMLScriptElement.prototype, 'src');
      if (originalSrcDescriptor) {
        Object.defineProperty(HTMLScriptElement.prototype, 'src', {
          set(val) {
            if (val && typeof val === 'string') {
              const lowerVal = val.toLowerCase();
              if (
                lowerVal.indexOf('recaptcha') !== -1 ||
                lowerVal.indexOf('turnstile') !== -1 ||
                lowerVal.indexOf('livechat') !== -1 ||
                lowerVal.indexOf('salesmartly') !== -1 ||
                lowerVal.indexOf('facebook') !== -1 ||
                lowerVal.indexOf('fbevents') !== -1
              ) {
                console.log("Redirecting third-party script load to safe empty script to prevent Script error:", val);
                // Blank base64 inline comment script, loads instantly with no CORS / network error
                originalSrcDescriptor.set.call(this, "data:text/javascript;base64,LyoqLw==");
                return;
              }
            }
            originalSrcDescriptor.set.call(this, val);
          },
          get() {
            return originalSrcDescriptor.get.call(this);
          },
          configurable: true
        });
      }

      // 5. Pre-populate sessionStorage with a fallback site config
      // to avoid race conditions/undefined crashes on first tick.
      try {
        const STORAGE_KEY = "xxapi_config_bundle_v1";
        let configData = null;
        try {
          const stored = sessionStorage.getItem(STORAGE_KEY);
          if (stored) {
            configData = JSON.parse(stored);
          }
        } catch (e) {}

        const isValid = configData && 
                        configData.body && 
                        configData.body.code === 0 && 
                        configData.body.data && 
                        configData.body.data.newsList;

        if (!isValid) {
          console.log("[Setup] Pre-populating sessionStorage with default site config...");
          const defaultBody = {
            code: 0,
            msg: "success",
            data: {
              usdtExchangerate: "80",
              currency: "INR",
              registerHost: "https://refer.vantage.top/#/rs/",
              tgChannelLink: "xxxx",
              rewardRules: {
                freeze_comp_reward: { name: "freeze_comp_reward", fixed: 0, ratio: 0, minCondi: 0, ruleActive: 0, rule: "{}" },
                inr_buy_dividend: { name: "inr_buy_dividend", fixed: 0, ratio: 0, minCondi: 0, ruleActive: 1, rule: "{\"1\": 0.003, \"2\": 0.002, \"3\": 0.001}" },
                inr_buy_reward: { name: "inr_buy_reward", fixed: 0, ratio: 2.5, minCondi: 1, ruleActive: 0, rule: "{\"rate_change\": \"2.0,2.5\", \"fixed_change\": \"0,0\"}" },
                inr_buy_reward_0: { name: "inr_buy_reward_0", fixed: 0, ratio: 2.5, minCondi: 0, ruleActive: 1, rule: "{\"rate_change\": \"2.0,2.5\", \"fixed_change\": \"0,0\"}" },
                today_buy_times_reward: { name: "today_buy_times_reward", fixed: 0, ratio: 0, minCondi: 0, ruleActive: 1, rule: "{\"1\": 10, \"3\": 20, \"5\": 20, \"10\": 50}" },
                usdt_buy_dividend: { name: "usdt_buy_dividend", fixed: 0, ratio: 0, minCondi: 100, ruleActive: 1, rule: "{\"1\": 0.003, \"2\": 0.001, \"3\": 0.0}" }
              },
              bannerSrcs: [
                "https://picsum.photos/seed/1/800/400",
                "https://picsum.photos/seed/2/800/400",
                "https://picsum.photos/seed/3/800/400"
              ],
              newsList: [
                { id: 32, cover: "", name: "securityupdate", code: "", type: 1, content: "Update verified", crtDate: 1779259339, crtUser: "alan", sort: 4 }
              ],
              pinFlag: false,
              ctTypes: [16, 1, 17, 2, 18, 3, 19, 4, 7, 9],
              ctTypesPayType: { "1": 2, "2": 2, "3": 1, "4": 2, "7": 3, "9": 2, "16": 2, "17": 2, "18": 1, "19": 2 },
              ifFinishNewbieActivity: 0,
              rptPaymentMode: 1,
              webLicenseId: "19711455",
              userBalShowReal: 0,
              sevenDayBuyEnabled: 0,
              v: 2039,
              pv: 3
            }
          };
          sessionStorage.setItem(STORAGE_KEY, JSON.stringify({
            at: Date.now(),
            body: defaultBody
          }));
        }
      } catch (err) {
        console.error("Failed to seed fallback site config:", err);
      }
    </script>
